name: Unit & Integration Tests

on:
  push:
    branches: [ "main", "GUI" ]
  pull_request:
    branches: [ "main", "GUI" ]

jobs:
  test-matrix:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install system GUI dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk xvfb
        
    - name: Install Poetry
      run: pipx install poetry
        
    - name: Install dependencies
      run: poetry install --no-root
      
    - name: Run unit tests with Xvfb (Linux)
      if: runner.os == 'Linux'
      run: xvfb-run poetry run pytest -m "not integration" -v

    - name: Run unit tests (Windows & macOS)
      if: runner.os != 'Linux'
      run: poetry run pytest -m "not integration" -v

  test-raspberry-pi:
    name: Test on Raspberry Pi (ARM64 emulation)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run tests in ARM64 container
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: ubuntu22.04
        githubToken: ${{ github.token }}
        install: |
          apt-get update -y
          apt-get install -y software-properties-common curl xvfb python3-tk
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update -y
          apt-get install -y python3.12 python3.12-venv python3.12-tk curl
          curl -sSL https://install.python-poetry.org | python3.12 -
        run: |
          export PATH="/root/.local/bin:$PATH"
          poetry env use python3.12
          poetry install --no-root
          xvfb-run poetry run pytest -m "not integration" -v
